name: Release

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Runs only for plain pushes to main (github.ref_type == 'branch').
  # Auto-bumps the patch version so every merge ships a release with zero
  # manual tagging. A direct `git push --tags` of a vX.Y.Z tag skips this
  # job entirely and build/release use that tag as-is.
  tag:
    name: Bump version
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag'
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next patch version
        id: bump
        run: |
          LAST_TAG=$(git tag -l 'v*.*.*' --sort=-v:refname | head -1)
          LAST_TAG="${LAST_TAG:-v0.0.0}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST_TAG#v}"
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${LAST_TAG} -> ${NEW_TAG}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [tag]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ needs.tag.outputs.tag || github.ref_name }}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags="-s -w -X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}" \
            -o "github-agent-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: github-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: [tag, build]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum github-agent-linux-amd64 github-agent-linux-arm64 > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.tag.outputs.tag || github.ref_name }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            github-agent-linux-amd64 \
            github-agent-linux-arm64 \
            checksums.txt
